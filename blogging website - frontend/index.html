<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Writersroom — Share Stories, Ideas & Blogs</title>
    <meta
      name="description"
      content="Writersroom is a modern blogging platform where writers and creators share stories, ideas, and knowledge with the world."
    />
    <meta name="keywords" content="blogging platform, writersroom, blogs, writers, stories, articles, content writing" />
    <meta name="author" content="Writersroom" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:title" content="Writersroom — Share Stories, Ideas & Blogs" />
    <meta
      property="og:description"
      content="A modern platform where writers share stories, ideas, and blogs with the world."
    />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Writersroom — Share Stories, Ideas & Blogs" />
    <meta
      name="twitter:description"
      content="A modern blogging platform for writers and creators."
    />

    <!-- Theme color -->
    <meta name="theme-color" content="#ffffff" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
